[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"  # downgraded from deny: js-sys 0.3.87 yanked (transitive dep, no direct fix)

# RUSTSEC-2023-0071: rsa Marvin Attack — no fix available upstream.
# Transitive dep via sqlx-mysql; not exploitable in this server context.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
unlicensed = "deny"
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "ISC", "BSD-2-Clause", "BSD-3-Clause", "Unicode-DFS-2016", "CC0-1.0", "OpenSSL"]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
