# IG Trading Engine — Hardened Configuration
# ============================================

[general]
mode = "demo"
log_level = "info"
heartbeat_interval_secs = 30
api_port = 9090

[ig]
environment = "demo"
identifier = "IDENTIFIER" # Replaced by environment variable at runtime
session_refresh_mins = 50
rate_limit_per_minute = 30
confirm_timeout_ms = 5000
confirm_max_retries = 10

[markets]
epics = [
    "CS.D.EURUSD.CSD.IP",
    "CS.D.USDJPY.CSD.IP",
    "CS.D.CFIGOLD.CFI.IP",
]
weekend_epics = []
context_market_ids = ["USDIND"]

[risk]
max_risk_per_trade = 0.5
max_daily_loss_pct = 2.0
max_weekly_drawdown_pct = 5.0
max_open_positions = 5
max_correlated_positions = 1
max_margin_usage_pct = 20.0
min_risk_reward = 2.5
sizing_method = "quarter_kelly"
max_daily_trades = 20
limited_risk_account = false
use_trailing_stop = true
trailing_stop_min_pips = 5.0
volatile_breakeven_trigger = 0.5   # Phase 15.C — snap SL to BE when profit >= 50% of SL distance (VOLATILE trades)
allowed_sessions = ["Asia", "London", "UsOverlap"]
trading_hours_utc = [0, 21]
allow_weekend_trading = true
news_blackout_windows_utc = []
instrument_specs = {}

[strategies]
m15_min_consensus = 2
min_consensus = 3
min_avg_strength = 7.5
default_atr_sl_multiplier = 1.5
default_atr_tp_multiplier = 4.0
h1_direction_gate_enabled = true   # Phase 14.E — block M15 entries against H1 bias
h1_alignment_bonus = 1.2           # Phase 14.E — boost M15 signals that agree with H1 direction (1.0 = off)
h1_macro_trend_gate_enabled = true # Phase 15.B — block H1 entries that trade against recent H1 price trend (skipped in VOLATILE)
h1_macro_trend_lookback = 5        # Phase 15.B — number of H1 closes used to compute slope (min 3)
volatile_atr_sl_multiplier = 1.0   # Phase 15.D — wider SL for VOLATILE wave trades (1.0×ATR, R:R=2.5)
volatile_atr_tp_multiplier = 2.5   # Phase 15.D — achievable TP for VOLATILE waves (2.5×ATR vs default 4.0×)
post_trade_cooldown_secs = 1800    # Phase 15.E — block re-entry on same epic for 30 min after any TP/SL close
require_h1_confirmation = true     # Phase 16.A — block M15 cold-start trades until H1 has established a direction

# Regime cooldown — relax VOLATILE restrictions after prolonged VOLATILE persistence.
# When VOLATILE lasts > regime_cooldown_days, the tight SL/TP and BE snap become
# counterproductive. Cooldown uses intermediate multipliers between VOLATILE and normal.
regime_cooldown_days = 7              # days before relaxation kicks in (comment out to disable)
regime_cooldown_sl_multiplier = 1.25  # between VOLATILE 1.0× and normal 1.5×
regime_cooldown_tp_multiplier = 3.0   # between VOLATILE 2.5× and normal 4.0×
regime_cooldown_disable_be_snap = true # skip aggressive BE snap after cooldown (trailing stop handles risk)

# Ensemble signal floor — signals crushed below this strength by regime multipliers
# are excluded from the consensus count and average strength calculation.
# Rationale: MA_Crossover 8.0 × 0.3 = 2.4 in TRENDING poisons a 7.5-avg ensemble.
# Excluding sub-floor signals means "this strategy is unreliable in this regime —
# don't let it vote". Set to 0.0 to disable (revert to old behaviour).
ensemble_signal_floor = 5.0

[strategies.consensus_matrix]
trending = { barrier = 3, min_strength = 7.5 }
ranging  = { barrier = 3, min_strength = 7.5 }
volatile = { barrier = 2, min_strength = 7.5 }  # scalp fallback: 2 strategies avg ≥ 7.5 (recalibrated for Phase 15.D — 1.0×SL / 2.5×TP, R:R=2.5)


[strategies.ma_crossover]
enabled = true
weight = 1.0
short_period = 9
long_period = 21
trend_filter_period = 200
require_adx_above = 15.0

[strategies.rsi_divergence]
enabled = true
weight = 0.9
period = 14
overbought = 70.0
oversold = 30.0
detect_divergence = true

[strategies.macd_momentum]
enabled = true
weight = 1.0
fast = 12
slow = 26
signal = 9

[strategies.bollinger_reversion]
enabled = true
weight = 0.8
period = 20
std_dev = 2.0

[strategies.multi_timeframe]
enabled = true
weight = 1.2
trend_tf = "HOUR_4"
signal_tf = "HOUR"
entry_tf = "MINUTE_15"

[strategies.stochastic_momentum]
enabled = true
weight = 1.0
overbought = 70.0
oversold = 30.0

[strategies.m15_momentum_burst]
enabled = true    # Phase 14 active
weight = 1.0
rsi_min = 55.0
rsi_max = 75.0
atr_sl_multiplier = 1.5   # 1.5x ATR stop — tight enough for M15
atr_tp_multiplier = 4.0   # 4.0x ATR take profit → R:R = 2.67 (clears min 2.5)

[strategies.m15_ema_microtrend]
enabled = true
weight = 1.0
atr_sl_multiplier = 1.5
atr_tp_multiplier = 4.0   # R:R = 2.67

[strategies.m15_bollinger_reversion]
enabled = true
weight = 1.0
percent_b_threshold = 0.05
rsi_threshold = 35.0
h1_rsi_confirm = 35.0
atr_sl_multiplier = 1.5
atr_tp_multiplier = 4.0   # R:R = 2.67 (BB mid band may be closer — ATR TP as fallback)

[trading_hours]
start = "07:00"   # London open — avoid Asia session chop on EUR/USD
end = "20:00"     # NY close — stop before thin overnight market
timezone = "UTC"

[notifications.telegram]
enabled = true
token = "TOKEN" # Replaced by environment variable
chat_id = "CHAT_ID" # Replaced by environment variable
trade_alerts = true
risk_alerts = true
daily_summary = true
summary_time = "21:00"
