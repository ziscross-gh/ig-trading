# IG Trading Engine — Live Ramp-Up Configuration
# ============================================
# Phase 2: Micro-Lot Live (Weeks 1–2)
#
# Ultra-conservative settings for the first real-money trades.
# Use this config until you have 10+ clean trades with no issues.
# Then switch to config/live.toml for normal live trading.
#
# Run order:
#   Phase 1 (Paper-on-Live): mode = "paper" in this file
#   Phase 2 (Micro-Lot Live): mode = "live" in this file
#   Phase 3 (Normal Live): switch to config/live.toml
#
# Key differences from live.toml:
#   - USD/JPY only (min 0.2 lots — smallest risk per trade)
#   - max_risk_per_trade = 0.25% (half of normal)
#   - max_open_positions = 1 (single position at a time)
#   - max_daily_trades = 5 (hard cap — no overtrading while learning)
#   - min_avg_strength = 8.0 (only very strong signals)
#   - max_margin_usage_pct = 10.0 (very tight)
#
# To add EUR/USD: uncomment "CS.D.EURUSD.CFD" below when account >= SGD 5,000

[general]
mode = "live"                    # Change to "paper" for Phase 1 (Paper-on-Live)
log_level = "info"
heartbeat_interval_secs = 30
api_port = 9090

[ig]
environment = "live"             # demo | live
session_refresh_mins = 50
rate_limit_per_minute = 20
confirm_timeout_ms = 5000
confirm_max_retries = 10

[markets]
# ── USD/JPY only during ramp-up ───────────────────────────────────────────────
# USD/JPY min deal size = 0.2 lots → smaller minimum risk than EUR/USD (0.5 lots)
# ⚠️  VERIFY EPIC CODE ON LIVE IG PLATFORM BEFORE GO-LIVE ⚠️
epics = [
    "CS.D.USDJPY.CFD",    # USD/JPY — verify on live IG platform

    # Add EUR/USD when account >= SGD 5,000 and after 10+ clean USD/JPY trades:
    # "CS.D.EURUSD.CFD",

    # Gold: DO NOT enable until account > SGD 20,000
    # "CS.D.GOLDUSD.CFD",
]

# ============================================
# RISK MANAGEMENT — ULTRA-CONSERVATIVE
# ============================================
[risk]
max_risk_per_trade = 0.25         # HALF of normal — first real-money trades
max_daily_loss_pct = 1.0          # Stop at 1% daily loss (tighter than normal 2%)
max_weekly_drawdown_pct = 3.0     # Weekly circuit breaker (tighter than normal 5%)
max_open_positions = 1            # Single position only during ramp
max_correlated_positions = 1
max_margin_usage_pct = 10.0       # Very tight — maximum safety margin
min_risk_reward = 1.5             # Higher R:R bar during ramp (normal=1.0)
sizing_method = "quarter_kelly"
max_daily_trades = 5              # Hard cap — no overtrading while learning

limited_risk_account = false      # Set true if your account requires guaranteed stops
use_trailing_stop = true
trailing_stop_min_pips = 5.0
allowed_sessions = ["Asia", "London", "UsOverlap"]
trading_hours_utc = [0, 21]
allow_weekend_trading = false

news_blackout_windows_utc = [[8, 30], [13, 30], [15, 0]]
news_blackout_mins = 15

# ── Macro Event Blackout Calendar (identical to live.toml) ────────────────────

[[risk.macro_events]]
hour = 21
minute = 0
label = "Daily market maintenance window (Gold + FX)"
blackout_mins = 60

[[risk.macro_events]]
hour = 0
minute = 30
label = "AU CPI / Trade Balance"
blackout_mins = 20

[[risk.macro_events]]
hour = 7
minute = 0
label = "EUR CPI / German Ifo / ZEW"
blackout_mins = 20

[[risk.macro_events]]
hour = 8
minute = 30
label = "London Open / EU PMI / UK data"
blackout_mins = 20

[[risk.macro_events]]
hour = 9
minute = 0
label = "ECB / Bank of England rate decisions"
blackout_mins = 45

[[risk.macro_events]]
hour = 13
minute = 30
label = "NFP / CPI / Core PCE / Retail Sales / GDP"
blackout_mins = 30

[[risk.macro_events]]
hour = 15
minute = 0
label = "US Open / ISM PMI / Factory Orders"
blackout_mins = 20

[[risk.macro_events]]
hour = 19
minute = 0
label = "FOMC Rate Decision / Fed Statement"
