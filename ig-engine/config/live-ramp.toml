[[risk.macro_events]]
hour = 19
minute = 30
label = "FOMC Press Conference"
blackout_mins = 45

# ── Instrument Specifications ──────────────────────────────────────────────────
# ⚠️  VALUES FROM DEMO VERIFICATION (2026-03-10) — RE-VERIFY ON LIVE PLATFORM

[risk.instrument_specs."CS.D.USDJPY.CFD"]
epic = "CS.D.USDJPY.CFD"
min_deal_size = 0.2               # Demo verified — re-verify on live
max_deal_size = 100.0
pip_value = 8.01  # 1 std lot (100k units) = 1000 JPY/pip × ~0.00801 JPY/SGD (IG verified)
pip_scale = 0.01
contract_size = 1.0
margin_requirement_pct = 5.0
size_decimals = 2
min_guaranteed_stop_pips = 7.0

# [risk.instrument_specs."CS.D.EURUSD.CFD"]  ← Uncomment when adding EUR/USD
# epic = "CS.D.EURUSD.CFD"
# min_deal_size = 0.5
# max_deal_size = 100.0
# pip_value = 12.70  # 1 std lot (100k units) = $10 USD/pip × ~1.27 USD/SGD
# pip_scale = 0.0001
# contract_size = 1.0
# margin_requirement_pct = 5.0
# size_decimals = 2
# min_guaranteed_stop_pips = 5.0

[risk.circuit_breaker]
consecutive_losses_reduce = 2     # Halve size after 2 losses
consecutive_losses_pause = 3      # Pause after 3 losses (stricter than normal 4 during ramp)
pause_duration_mins = 240         # 4-hour pause (longer than normal during ramp)
daily_loss_warning_pct = 50.0     # Alert at 50% of daily limit (earlier warning)

# ============================================
# STRATEGIES — HIGH CONVICTION BAR
# ============================================
[strategies]
min_consensus = 3                 # Require 3/4 strategies to agree
min_avg_strength = 8.0            # HIGHER bar than live.toml (7.5) — only very strong signals
default_atr_sl_multiplier = 2.0
default_atr_tp_multiplier = 3.0

[strategies.ma_crossover]
enabled = true
weight = 1.0
short_period = 9
long_period = 21
trend_filter_period = 200
require_adx_above = 25.0
atr_sl_multiplier = 2.0
atr_tp_multiplier = 3.0
trailing_stop_pips = 15.0

[strategies.rsi_divergence]
enabled = true
weight = 0.9
period = 14
overbought = 70.0
oversold = 30.0
detect_divergence = true
atr_sl_multiplier = 2.0
atr_tp_multiplier = 3.5
trailing_stop_pips = 12.0

[strategies.macd_momentum]
enabled = true
weight = 1.0
fast = 12
slow = 26
signal = 9
atr_sl_multiplier = 2.0
atr_tp_multiplier = 3.0
trailing_stop_pips = 15.0

[strategies.bollinger_reversion]
enabled = true
weight = 0.8
period = 20
std_dev = 2.0
atr_sl_multiplier = 1.5
atr_tp_multiplier = 2.5
trailing_stop_pips = 10.0

# ── Per-instrument strategy overrides ────────────────────────────────────────
[strategies.instrument_overrides."CS.D.USDJPY.CFD"]
adx_range_filter = true
adx_range_max    = 25.0

# [strategies.instrument_overrides."CS.D.EURUSD.CFD"]  ← Uncomment with EUR/USD
# adx_range_filter = true
# adx_range_max    = 25.0

# Multi-timeframe confirmation
[strategies.multi_timeframe]
enabled = true
weight = 1.2
trend_tf = "HOUR_4"
signal_tf = "HOUR"
entry_tf = "MINUTE_15"
trailing_stop_pips = 15.0

# ============================================
# TRADING HOURS (UTC)
# ============================================
[trading_hours]
start = "00:00"                   # 08:00 SGT — Asia open
end = "21:00"                     # 05:00 SGT — stop before daily maintenance window
timezone = "UTC"

# ============================================
# NOTIFICATIONS
# ============================================
[notifications.telegram]
enabled = true
trade_alerts = true
risk_alerts = true
daily_summary = true
summary_time = "21:00"            # 05:00 SGT — end of trading day
