# IG Trading Engine — Live Configuration
# ============================================
# CAUTION: This configuration uses REAL MONEY.
#
# ⚠️  BEFORE GOING LIVE — verify on the IG live platform:
#     1. Epic codes below are PLACEHOLDER GUESSES — confirm each in IG web/app
#     2. min_deal_size values were verified on DEMO — re-verify on live
#     3. margin_requirement_pct values — re-verify on live
#     4. If your account is a "Limited Risk" account, set limited_risk_account = true
#
# Phased rollout:
#     Phase 1 (Paper-on-Live) : mode = "paper", CONFIG_PATH=config/live-ramp.toml
#     Phase 2 (Micro-Lot Live): mode = "live",  CONFIG_PATH=config/live-ramp.toml
#     Phase 3 (Normal Live)   : mode = "live",  CONFIG_PATH=config/live.toml

[general]
mode = "live"                    # paper | demo | live
log_level = "info"
heartbeat_interval_secs = 30
api_port = 9090

[ig]
environment = "live"             # demo | live
session_refresh_mins = 50        # Refresh before 60-min expiry
rate_limit_per_minute = 20       # Conservative (IG allows 30/account, 60/app)
confirm_timeout_ms = 5000
confirm_max_retries = 10

[markets]
# ── FX pairs only for initial live trading ────────────────────────────────────
# ⚠️  VERIFY THESE EPIC CODES ON THE LIVE IG PLATFORM BEFORE GO-LIVE ⚠️
epics = [
    "CS.D.EURUSD.CFD",    # EUR/USD — verify on live IG platform
    "CS.D.USDJPY.CFD",    # USD/JPY — verify on live IG platform

    # --- GOLD: DO NOT ENABLE UNTIL ACCOUNT > SGD 20,000 ---
    # Min 3.0 lots × ~$2700 × 20% margin = ~SGD 1,620 per position (too large for < SGD 20k)
    # "CS.D.GOLDUSD.CFD",

    # --- PHASE 2 SCALING PAIRS (add when profitable for 4+ weeks) ---
    # "CS.D.GBPUSD.CFD",
]

# ============================================
# RISK MANAGEMENT
# ============================================
[risk]
max_risk_per_trade = 0.5          # 0.5% of account per trade
max_daily_loss_pct = 2.0          # Stop trading after 2% daily loss
max_weekly_drawdown_pct = 5.0     # Weekly circuit breaker
max_open_positions = 2            # Max 2 concurrent positions (FX only)
max_correlated_positions = 1      # Max 1 position in correlated pairs
max_margin_usage_pct = 15.0       # Tighter than demo (demo=20%) — protects small accounts
min_risk_reward = 1.0             # Minimum 1:1 risk/reward
sizing_method = "quarter_kelly"   # Quarter-Kelly: conservative sizing
max_daily_trades = 10             # Hard cap on daily trades

# Set to true if your live account is a "Limited Risk Account" (requires guaranteed stops)
# If true, IG charges a small premium per trade.
limited_risk_account = false
use_trailing_stop = true
trailing_stop_min_pips = 5.0
allowed_sessions = ["Asia", "London", "UsOverlap"]
trading_hours_utc = [0, 21]          # 00:00–21:00 UTC = 08:00–05:00 SGT
allow_weekend_trading = false

# Legacy flat blackout (fallback when macro_events is empty — keep as safety net)
news_blackout_windows_utc = [[8, 30], [13, 30], [15, 0]]
news_blackout_mins = 15

# ── Macro Event Blackout Calendar ──────────────────────────────────────────────
# Per-event blackout windows supersede the legacy flat blackout above.
# blackout_mins = minutes blocked BEFORE and AFTER the event time (UTC).

[[risk.macro_events]]
hour = 21
minute = 0
label = "Daily market maintenance window (Gold + FX)"
blackout_mins = 60                # 21:00–22:00 UTC = 05:00–06:00 SGT

[[risk.macro_events]]
hour = 0
minute = 30
label = "AU CPI / Trade Balance"
blackout_mins = 20

[[risk.macro_events]]
hour = 7
minute = 0
label = "EUR CPI / German Ifo / ZEW"
blackout_mins = 20

[[risk.macro_events]]
hour = 8
minute = 30
label = "London Open / EU PMI / UK data"
blackout_mins = 20

[[risk.macro_events]]
hour = 9
minute = 0
label = "ECB / Bank of England rate decisions"
blackout_mins = 45

[[risk.macro_events]]
hour = 13
minute = 30
label = "NFP / CPI / Core PCE / Retail Sales / GDP"
blackout_mins = 30

[[risk.macro_events]]
hour = 15
minute = 0
label = "US Open / ISM PMI / Factory Orders"
blackout_mins = 20

[[risk.macro_events]]
hour = 19
minute = 0
label = "FOMC Rate Decision / Fed Statement"
blackout_mins = 60

[[risk.macro_events]]
hour = 19
minute = 30
label = "FOMC Press Conference"
blackout_mins = 45

# ── Instrument Specifications ──────────────────────────────────────────────────
# ⚠️  VALUES FROM DEMO VERIFICATION (2026-03-10) — RE-VERIFY ON LIVE PLATFORM
# To verify: IG web → open deal ticket → check min size, margin %, stop distance

[risk.instrument_specs."CS.D.EURUSD.CFD"]
epic = "CS.D.EURUSD.CFD"
min_deal_size = 0.5               # Demo verified — re-verify on live
max_deal_size = 100.0
pip_value = 1.25
pip_scale = 0.0001
contract_size = 1.0
margin_requirement_pct = 5.0
size_decimals = 2
min_guaranteed_stop_pips = 5.0

[risk.instrument_specs."CS.D.USDJPY.CFD"]
epic = "CS.D.USDJPY.CFD"
min_deal_size = 0.2               # Demo verified — re-verify on live
max_deal_size = 100.0
pip_value = 0.81
pip_scale = 0.01
contract_size = 1.0
margin_requirement_pct = 5.0
size_decimals = 2
min_guaranteed_stop_pips = 7.0

# [risk.instrument_specs."CS.D.GOLDUSD.CFD"]  ← Uncomment when account > SGD 20,000
# epic = "CS.D.GOLDUSD.CFD"
# min_deal_size = 3.0             # Min position = ~SGD 1,620 margin
# max_deal_size = 100.0
# pip_value = 1.0
# pip_scale = 1.0
# contract_size = 1.0
# margin_requirement_pct = 20.0
# size_decimals = 2
# min_guaranteed_stop_pips = 2.0

[risk.circuit_breaker]
consecutive_losses_reduce = 2     # After 2 losses: halve position size
consecutive_losses_pause = 4      # After 4 losses: pause trading
pause_duration_mins = 120         # Pause for 2 hours
daily_loss_warning_pct = 60.0     # Alert at 60% of daily limit

# ============================================
# STRATEGIES
# ============================================
[strategies]
min_consensus = 3                 # Require 3/4 strategies to agree (high conviction for live)
min_avg_strength = 7.5            # Slightly tighter than demo (7.0)
default_atr_sl_multiplier = 2.0
default_atr_tp_multiplier = 3.0

[strategies.ma_crossover]
enabled = true
weight = 1.0
short_period = 9
long_period = 21
trend_filter_period = 200
require_adx_above = 25.0
atr_sl_multiplier = 2.0
atr_tp_multiplier = 3.0
trailing_stop_pips = 15.0

[strategies.rsi_divergence]
enabled = true
weight = 0.9
period = 14
overbought = 70.0
oversold = 30.0
detect_divergence = true
atr_sl_multiplier = 2.0
atr_tp_multiplier = 3.5
trailing_stop_pips = 12.0

[strategies.macd_momentum]
enabled = true
weight = 1.0
fast = 12
slow = 26
signal = 9
atr_sl_multiplier = 2.0
atr_tp_multiplier = 3.0
trailing_stop_pips = 15.0

[strategies.bollinger_reversion]
enabled = true
weight = 0.8
period = 20
std_dev = 2.0
atr_sl_multiplier = 1.5
atr_tp_multiplier = 2.5
trailing_stop_pips = 10.0

# ── Per-instrument strategy overrides ────────────────────────────────────────
# ADX range filter: suppress mean-reversion strategies when market is trending hard
[strategies.instrument_overrides."CS.D.EURUSD.CFD"]
adx_range_filter = true
adx_range_max    = 25.0

[strategies.instrument_overrides."CS.D.USDJPY.CFD"]
adx_range_filter = true
adx_range_max    = 25.0

# [strategies.instrument_overrides."CS.D.GOLDUSD.CFD"]  ← Uncomment with Gold epic
# adx_range_filter = true
# adx_range_max    = 25.0

# Multi-timeframe confirmation
[strategies.multi_timeframe]
enabled = true
weight = 1.2
trend_tf = "HOUR_4"
signal_tf = "HOUR"
entry_tf = "MINUTE_15"
trailing_stop_pips = 15.0

# ============================================
# TRADING HOURS (UTC)
# ============================================
[trading_hours]
start = "00:00"                   # 08:00 SGT — Asia open
end = "21:00"                     # 05:00 SGT — stop before daily maintenance window
timezone = "UTC"

# ============================================
# NOTIFICATIONS
# ============================================
[notifications.telegram]
enabled = true
trade_alerts = true
risk_alerts = true
daily_summary = true
summary_time = "21:00"            # 05:00 SGT — end of trading day
